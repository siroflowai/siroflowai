<!DOCTYPE html>
<html lang="pl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Panel zarządcy — SiroFlow AI</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #050714;
    --navy: #0B1437;
    --violet: #6366F1;
    --violet-light: #818CF8;
    --cyan: #22D3EE;
    --text: #E5E7EB;
    --text-dim: #9CA3AF;
    --border: rgba(255,255,255,0.08);
    --card: rgba(255,255,255,0.03);
    --error: #EF4444;
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html, body { height: 100%; }
  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'Inter', system-ui, sans-serif;
    font-size: 15px;
    line-height: 1.5;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 20px;
  }
  .bg-grad {
    position: fixed;
    inset: 0;
    background:
      radial-gradient(ellipse at 20% 0%, rgba(99,102,241,0.12) 0%, transparent 50%),
      radial-gradient(ellipse at 80% 100%, rgba(34,211,238,0.08) 0%, transparent 50%);
    pointer-events: none;
    z-index: 0;
  }
  .login-card {
    position: relative;
    z-index: 1;
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 16px;
    padding: 48px 40px;
    width: 100%;
    max-width: 420px;
    backdrop-filter: blur(10px);
  }
  .brand {
    font-family: 'Space Grotesk', sans-serif;
    font-size: 13px;
    font-weight: 600;
    letter-spacing: 0.18em;
    color: var(--violet-light);
    text-transform: uppercase;
    margin-bottom: 8px;
  }
  h1 {
    font-family: 'Space Grotesk', sans-serif;
    font-size: 28px;
    font-weight: 600;
    letter-spacing: -0.02em;
    color: #fff;
    margin-bottom: 8px;
  }
  .subtitle {
    color: var(--text-dim);
    font-size: 14px;
    margin-bottom: 36px;
  }
  .field {
    margin-bottom: 18px;
  }
  .field label {
    display: block;
    font-size: 13px;
    font-weight: 500;
    color: var(--text-dim);
    margin-bottom: 8px;
  }
  .field input {
    width: 100%;
    padding: 12px 14px;
    background: rgba(255,255,255,0.04);
    border: 1px solid var(--border);
    border-radius: 8px;
    color: var(--text);
    font-family: inherit;
    font-size: 14px;
    transition: border-color 0.15s, background 0.15s;
  }
  .field input:focus {
    outline: none;
    border-color: var(--violet);
    background: rgba(255,255,255,0.06);
  }
  .submit {
    width: 100%;
    padding: 13px;
    background: #fff;
    color: var(--navy);
    border: none;
    border-radius: 8px;
    font-family: inherit;
    font-size: 15px;
    font-weight: 600;
    cursor: pointer;
    margin-top: 8px;
    transition: opacity 0.15s;
  }
  .submit:hover { opacity: 0.9; }
  .submit:disabled {
    opacity: 0.5;
    cursor: not-allowed;
  }
  .error {
    color: var(--error);
    font-size: 13px;
    margin-top: 14px;
    min-height: 18px;
  }
  .footer {
    margin-top: 36px;
    padding-top: 24px;
    border-top: 1px solid var(--border);
    font-size: 12px;
    color: var(--text-dim);
    text-align: center;
  }
  .footer a { color: var(--violet-light); text-decoration: none; }
</style>
</head>
<body>
<div class="bg-grad"></div>
<div class="login-card">
  <div class="brand">SiroFlow AI</div>
  <h1>Panel zarządcy</h1>
  <p class="subtitle">Zaloguj się, aby zobaczyć zgłoszenia usterek</p>

  <form id="f">
    <div class="field">
      <label for="email">Email</label>
      <input type="email" id="email" name="email" autocomplete="email" required>
    </div>
    <div class="field">
      <label for="password">Hasło</label>
      <input type="password" id="password" name="password" autocomplete="current-password" required>
    </div>
    <button type="submit" class="submit" id="btn">Zaloguj</button>
    <div class="error" id="err"></div>
  </form>

  <div class="footer">
    Problem z logowaniem? <a href="mailto:hello@siroflowai.pl">hello@siroflowai.pl</a>
  </div>
</div>

<script>
(function() {
  var f = document.getElementById('f');
  var err = document.getElementById('err');
  var btn = document.getElementById('btn');

  // Jeśli już zalogowany, przekieruj
  if (sessionStorage.getItem('sf_auth')) {
    window.location.href = '/panel/dashboard.html';
    return;
  }

  f.addEventListener('submit', function(e) {
    e.preventDefault();
    err.textContent = '';
    btn.disabled = true;
    btn.textContent = 'Logowanie...';

    var email = document.getElementById('email').value.trim().toLowerCase();
    var password = document.getElementById('password').value;

    fetch('/api/auth', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ email: email, password: password })
    })
    .then(function(res) { return res.json().then(function(data) { return { ok: res.ok, data: data }; }); })
    .then(function(result) {
      if (!result.ok) {
        err.textContent = result.data.error || 'Błąd logowania';
        btn.disabled = false;
        btn.textContent = 'Zaloguj';
        return;
      }
      // Zapisz sesję
      sessionStorage.setItem('sf_auth', result.data.token);
      sessionStorage.setItem('sf_user', JSON.stringify({ email: email, name: result.data.name }));
      window.location.href = '/panel/dashboard.html';
    })
    .catch(function() {
      err.textContent = 'Problem z połączeniem. Spróbuj ponownie.';
      btn.disabled = false;
      btn.textContent = 'Zaloguj';
    });
  });
})();
</script>
</body>
</html>
