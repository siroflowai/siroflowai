<!DOCTYPE html>
<html lang="pl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SiroFlow AI</title>
<meta name="description" content="Automatyzacje AI, które oddają Ci czas.">
<link rel="icon" type="image/svg+xml" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'%3E%3Cdefs%3E%3ClinearGradient id='g' x1='0%25' y1='0%25' x2='100%25' y2='100%25'%3E%3Cstop offset='0%25' stop-color='%236366F1'/%3E%3Cstop offset='100%25' stop-color='%2322D3EE'/%3E%3C/linearGradient%3E%3C/defs%3E%3Crect width='32' height='32' rx='7' fill='%230B1437'/%3E%3Cpath d='M 24 10 Q 24 6 19 6 L 13 6 Q 8 6 8 11 Q 8 16 13 16 L 19 16 Q 24 16 24 21 Q 24 26 19 26 L 13 26 Q 8 26 8 23' fill='none' stroke='url(%23g)' stroke-width='3.5' stroke-linecap='round' stroke-linejoin='round'/%3E%3C/svg%3E">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
  :root {
    --navy-deep: #070D24;
    --navy: #0B1437;
    --violet: #6366F1;
    --cyan: #22D3EE;
    --mist: #E2E8F0;
    --slate: #475569;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: var(--navy-deep);
    color: var(--mist);
    font-family: 'Space Grotesk', system-ui, sans-serif;
    min-height: 100vh;
    position: relative;
    overflow-x: hidden;
    -webkit-font-smoothing: antialiased;
  }

  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background:
      radial-gradient(ellipse 40% 60% at 25% 50%, rgba(99, 102, 241, 0.08), transparent),
      radial-gradient(ellipse 30% 40% at 75% 60%, rgba(34, 211, 238, 0.05), transparent);
    pointer-events: none;
  }

  /* Frame corners — subtle editorial markers */
  .frame {
    position: fixed;
    pointer-events: none;
    width: 28px;
    height: 28px;
    border: 1px solid rgba(99, 102, 241, 0.25);
  }
  .frame.tl { top: 32px; left: 32px; border-right: none; border-bottom: none; }
  .frame.tr { top: 32px; right: 32px; border-left: none; border-bottom: none; }
  .frame.bl { bottom: 80px; left: 32px; border-right: none; border-top: none; }
  .frame.br { bottom: 80px; right: 32px; border-left: none; border-top: none; }

  /* Top label */
  .top-label {
    position: fixed;
    top: 32px;
    left: 50%;
    transform: translateX(-50%);
    font-family: 'JetBrains Mono', monospace;
    font-size: 10px;
    letter-spacing: 3px;
    text-transform: uppercase;
    color: var(--slate);
    opacity: 0;
    animation: fadeIn 1.2s ease-out 0.2s forwards;
  }

  /* Main split layout */
  .split {
    min-height: 100vh;
    display: grid;
    grid-template-columns: 1fr 1fr;
    align-items: center;
    padding: 80px 80px;
    gap: 80px;
    position: relative;
    z-index: 2;
  }

  /* Left column — logo */
  .left {
    display: flex;
    justify-content: flex-end;
    align-items: center;
    position: relative;
  }

  .logo {
    width: 200px;
    height: 200px;
    opacity: 0;
    animation: slideFromLeft 1s ease-out 0.4s forwards;
  }

  @keyframes slideFromLeft {
    from { opacity: 0; transform: translateX(-30px); }
    to { opacity: 1; transform: translateX(0); }
  }

  /* Vertical divider */
  .divider {
    position: absolute;
    top: 20%;
    bottom: 20%;
    left: 50%;
    width: 1px;
    transform: translateX(-50%);
    background: linear-gradient(
      to bottom,
      transparent 0%,
      rgba(99, 102, 241, 0.3) 50%,
      transparent 100%
    );
    opacity: 0;
    animation: fadeIn 1.5s ease-out 0.6s forwards;
  }

  /* Right column — text */
  .right {
    opacity: 0;
    animation: slideFromRight 1s ease-out 0.5s forwards;
  }

  @keyframes slideFromRight {
    from { opacity: 0; transform: translateX(30px); }
    to { opacity: 1; transform: translateX(0); }
  }

  .eyebrow {
    font-family: 'JetBrains Mono', monospace;
    font-size: 10px;
    letter-spacing: 2px;
    text-transform: uppercase;
    color: var(--cyan);
    margin-bottom: 28px;
    display: flex;
    align-items: center;
    gap: 12px;
  }

  
  h1 {
    font-family: 'Space Grotesk', sans-serif;
    font-weight: 600;
    font-size: clamp(40px, 5vw, 64px);
    line-height: 1;
    letter-spacing: -2px;
    color: #FFFFFF;
    margin-bottom: 20px;
  }

  h1 .ai {
    font-weight: 400;
    background: linear-gradient(135deg, #6366F1 0%, #22D3EE 50%, #6366F1 100%);
    background-size: 200% 100%;
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
    animation: gradShift 5s ease-in-out infinite;
  }

  @keyframes gradShift {
    0%, 100% { background-position: 0% 50%; }
    50% { background-position: 100% 50%; }
  }

  .tagline {
    font-family: 'Space Grotesk', sans-serif;
    font-weight: 400;
    font-size: clamp(14px, 1.5vw, 16px);
    color: rgba(226, 232, 240, 0.65);
    max-width: 340px;
    margin-bottom: 48px;
    line-height: 1.55;
  }

  .contact {
    font-family: 'JetBrains Mono', monospace;
    font-size: 12px;
    letter-spacing: 0.5px;
    color: var(--slate);
  }

  .contact a {
    color: var(--mist);
    text-decoration: none;
    position: relative;
    transition: color 0.3s ease;
  }

  .contact a::after {
    content: '';
    position: absolute;
    bottom: -3px;
    left: 0;
    width: 100%;
    height: 1px;
    background: var(--cyan);
    transform: scaleX(0);
    transform-origin: left;
    transition: transform 0.4s ease;
  }

  .contact a:hover { color: var(--cyan); }
  .contact a:hover::after { transform: scaleX(1); }

  /* Bottom label */
  .bottom-label {
    position: fixed;
    top: 75%;
    left: 50%;
    transform: translateX(-50%);
    font-family: 'JetBrains Mono', monospace;
    font-size: 10px;
    letter-spacing: 3px;
    text-transform: uppercase;
    color: var(--slate);
    opacity: 0;
    animation: fadeIn 1.2s ease-out 0.8s forwards;
  }

  @keyframes fadeIn {
    to { opacity: 1; }
  }

  @media (prefers-reduced-motion: reduce) {
    *, *::before, *::after {
      animation-duration: 0.01ms !important;
      animation-iteration-count: 1 !important;
    }
    .top-label, .logo, .divider, .right, .bottom-label { opacity: 1 !important; transform: none !important; }
  }

  /* Mobile — stack vertically */
  @media (max-width: 860px) {
    .split {
      grid-template-columns: 1fr;
      padding: 100px 30px 100px;
      gap: 40px;
      text-align: center;
    }
    .left { justify-content: center; }
    .divider { display: none; }
    .logo { width: 130px; height: 130px; }
    .eyebrow { justify-content: center; }
    .tagline { margin-left: auto; margin-right: auto; }
    .frame { width: 18px; height: 18px; }
    .frame.tl { top: 20px; left: 20px; }
    .frame.tr { top: 20px; right: 20px; }
    .frame.bl { bottom: 20px; left: 20px; }
    .frame.br { bottom: 20px; right: 20px; }
    .top-label, .bottom-label { font-size: 9px; letter-spacing: 2px; }
  }
</style>
</head>
<body>

<div class="frame tl"></div>
<div class="frame tr"></div>
<div class="frame bl"></div>
<div class="frame br"></div>


<main class="split">

  <div class="left">
    <div class="logo">
      <svg viewBox="0 0 100 100" xmlns="http://www.w3.org/2000/svg" width="100%" height="100%">
        <defs>
          <linearGradient id="sf2" x1="0%" y1="0%" x2="100%" y2="100%">
            <stop offset="0%" stop-color="#6366F1">
              <animate attributeName="stop-color" values="#6366F1; #22D3EE; #6366F1" dur="4s" repeatCount="indefinite"/>
            </stop>
            <stop offset="100%" stop-color="#22D3EE">
              <animate attributeName="stop-color" values="#22D3EE; #6366F1; #22D3EE" dur="4s" repeatCount="indefinite"/>
            </stop>
          </linearGradient>
        </defs>
        <path d="M 78 28 Q 78 14 60 14 L 40 14 Q 22 14 22 32 Q 22 50 40 50 L 60 50 Q 78 50 78 68 Q 78 86 60 86 L 40 86 Q 22 86 22 72"
              fill="none" stroke="url(#sf2)" stroke-width="12"
              stroke-linecap="round" stroke-linejoin="round"/>
      </svg>
    </div>
    <div class="divider"></div>
  </div>

  <div class="right">
    <div class="eyebrow"></div>
    <h1>SiroFlow <span class="ai">AI</span></h1>
    <p class="tagline">Automatyzacje AI, które oddają Ci czas.</p>
    <div class="contact">
      — <a href="mailto:hello@siroflowai.pl">hello@siroflowai.pl</a>
    </div>
  </div>

</main>

<div class="bottom-label">In Progress</div>

</body>
</html>
